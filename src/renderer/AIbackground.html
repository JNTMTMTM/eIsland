<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #000; /* 纯黑背景让光晕效果更明显 */
    }
    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
    }
</style>
</head>
<body>
<canvas id="lightCanvas"></canvas>

<script>
const canvas = document.getElementById('lightCanvas');
const ctx = canvas.getContext('2d');

let w, h;
let hueOffset = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function animate() {
    ctx.clearRect(0, 0, w, h);
    hueOffset += 0.6;

    const blurRadius = 40;
    const strokeWidth = 60;
    const offset = 10; // 向外偏移以隐藏实体线，只让柔和光晕漏进屏幕

    // Canvas filter 比 shadowBlur 对渐变色的支持更好
    ctx.filter = `blur(${blurRadius}px)`;

    const gradient = ctx.createLinearGradient(0, 0, w, h);
    gradient.addColorStop(0.0, `hsl(${hueOffset}, 100%, 60%)`);
    gradient.addColorStop(0.25, `hsl(${hueOffset + 60}, 100%, 60%)`);
    gradient.addColorStop(0.5, `hsl(${hueOffset + 120}, 100%, 60%)`);
    gradient.addColorStop(0.75, `hsl(${hueOffset + 180}, 100%, 60%)`);
    gradient.addColorStop(1.0, `hsl(${hueOffset + 240}, 100%, 60%)`);

    ctx.beginPath();
    ctx.rect(
        -offset, 
        -offset, 
        w + offset * 2, 
        h + offset * 2
    );

    ctx.lineWidth = strokeWidth;
    ctx.strokeStyle = gradient;

    // 可选：开启叠加模式使光晕更亮
    // ctx.globalCompositeOperation = 'lighter';

    ctx.stroke();

    // 重置 filter 避免影响后续绘制
    ctx.filter = 'none';
    
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
