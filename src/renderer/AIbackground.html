  @file AIbackground.html
  @description Apple Intelligence 风格全屏边缘光效
  @author silenthim JNTMTMTM
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: transparent;
    }
    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
    }
</style>
</head>
<body>
<canvas id="lightCanvas"></canvas>

<script>
const canvas = document.getElementById('lightCanvas');
const ctx = canvas.getContext('2d');

let w, h;
let dpr = window.devicePixelRatio || 1;

function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// 动画参数
const CYCLE = 24;       // 色环旋转周期（秒）
const BREATH = 5;       // 呼吸周期（秒）
const CORNER = 20;      // 容器圆角半径
const INSET = 10;       // 边框向内收缩距离

// 圆角矩形路径
function roundedRectPath(x, y, rw, rh, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + rw - r, y);
    ctx.quadraticCurveTo(x + rw, y, x + rw, y + r);
    ctx.lineTo(x + rw, y + rh - r);
    ctx.quadraticCurveTo(x + rw, y + rh, x + rw - r, y + rh);
    ctx.lineTo(x + r, y + rh);
    ctx.quadraticCurveTo(x, y + rh, x, y + rh - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// 渐变色停：橙→红→品红→紫→蓝→靛→紫→品红（循环）
const GRADIENT_STOPS = [
    [0.00, 30, 100, 60],   // 橙
    [0.10, 10, 100, 55],   // 红橙
    [0.20, 350, 100, 55],  // 红
    [0.30, 330, 100, 55],  // 玫红
    [0.45, 300, 100, 50],  // 品红
    [0.55, 275, 100, 50],  // 紫
    [0.65, 255, 100, 55],  // 蓝紫
    [0.75, 235, 100, 60],  // 蓝
    [0.85, 260, 100, 55],  // 靛蓝
    [0.92, 290, 100, 50],  // 紫红
    [1.00, 30, 100, 60],   // 橙（闭合）
];

// 绘制多层辉光 + 锐线，模拟霓虹边框效果
function drawNeonBorder(rotation, breath) {
    const x = -INSET;
    const y = -INSET;
    const rw = w + INSET * 2;
    const rh = h + INSET * 2;
    const cx = w / 2;
    const cy = h / 2;

    // 层配置：[blur, lineWidth, alpha]
    const layers = [
        [60, 38, 0.12 * breath],   // 最外层柔光
        [35, 26, 0.22 * breath],   // 中间辉光
        [18, 14, 0.40 * breath],   // 内辉光
        [8,  6,  0.70 * breath],   // 窄辉光
        [2,  2.5, 1.0],            // 锐线核心
    ];

    for (const [blur, lineWidth, alpha] of layers) {
        ctx.save();
        ctx.filter = blur > 0 ? `blur(${blur}px)` : 'none';
        ctx.globalAlpha = alpha;

        roundedRectPath(x, y, rw, rh, CORNER + INSET);

        const gradient = ctx.createConicGradient(rotation, cx, cy);
        for (const [stop, hue, sat, lum] of GRADIENT_STOPS) {
            gradient.addColorStop(stop, `hsl(${hue}, ${sat}%, ${lum}%)`);
        }

        ctx.lineWidth = lineWidth;
        ctx.strokeStyle = gradient;
        ctx.stroke();
        ctx.restore();
    }
}

function animate(t) {
    t /= 1000;
    ctx.clearRect(0, 0, w, h);

    const breath = 0.85 + 0.15 * Math.sin(t * Math.PI * 2 / BREATH);
    const rotation = (t / CYCLE) * Math.PI * 2;

    drawNeonBorder(rotation, breath);

    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
