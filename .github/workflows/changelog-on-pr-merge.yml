name: Auto Update CHANGELOG

on:
  pull_request:
    types: [closed]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-changelog:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main') ||
      (github.event_name == 'release' && github.event.release.target_commitish == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.event.release.target_commitish }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate CHANGE_LOG.md
        run: npm run changelog:generate

      - name: Commit and push CHANGE_LOG.md
        shell: bash
        run: |
          if git diff --quiet -- docs/CHANGE_LOG.md; then
            echo "No changelog updates detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/CHANGE_LOG.md
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git commit -m "docs: auto update CHANGE_LOG.md for #${{ github.event.pull_request.number }} by @${{ github.event.pull_request.user.login }} [skip ci]"
            git push origin HEAD:${{ github.event.pull_request.base.ref }}
          else
            git commit -m "docs: auto update CHANGE_LOG.md for release ${{ github.event.release.tag_name }} by @${{ github.actor }} [skip ci]"
            git push origin HEAD:${{ github.event.release.target_commitish }}
          fi
