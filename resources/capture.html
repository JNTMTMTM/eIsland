<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>eIsland Screenshot</title>
<link rel="stylesheet" href="./capture.css">
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="draw-canvas"></canvas>
<canvas id="temp-canvas"></canvas>
<canvas id="mask-canvas"></canvas>

<div id="size-info"></div>

<div id="toolbar">
  <button class="tool active" data-tool="select">选区</button>
  <button class="tool" data-tool="mosaic">马赛克</button>
  <button class="tool" data-tool="line">直线</button>
  <button class="tool" data-tool="rect">矩形</button>
  <button class="tool" data-tool="pen">画笔</button>
  <button id="btnUndo">撤销</button>

  <div class="sep"></div>
  <span class="label">颜色</span>
  <input type="color" id="colorPicker" value="#ff4d4f" />
  <span class="label">粗细</span>
  <select id="sizePicker">
    <option value="2">2px</option>
    <option value="4" selected>4px</option>
    <option value="6">6px</option>
    <option value="8">8px</option>
    <option value="12">12px</option>
  </select>

  <div class="sep"></div>
  <button class="primary" id="btnCopy">复制</button>
  <button id="btnSave">保存</button>
  <button class="danger" id="btnCancel">取消</button>
</div>

<script src="./capture.js"></script>
</body>
</html>
